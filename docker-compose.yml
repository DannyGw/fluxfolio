services:
  postgres:
    image: postgres:16-alpine
    container_name: fluxfolio-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fluxfolio
      POSTGRES_PASSWORD: fluxfolio_secret
      POSTGRES_DB: fluxfolio
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: fluxfolio-pgadmin
    restart: unless-stopped
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@fluxfolio.dev
      PGADMIN_DEFAULT_PASSWORD: admin123
    depends_on:
      - postgres

volumes:
  postgres_data:
